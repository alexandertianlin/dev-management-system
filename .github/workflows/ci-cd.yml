
name: CI/CD Pipeline

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ main ]

jobs:
  # ======================
  # CI: 持续集成
  # ======================
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov
          if [ -f shared/requirements/base.txt ]; then pip install -r shared/requirements/base.txt; fi

      - name: Static code analysis (Ruff)
        run: ruff check tasks/ skills/ shared/ scripts/ --output-format=github

      - name: Run unit tests
        run: pytest tests/ --cov=src --cov-fail-under=80 --junitxml=report.xml

      - name: Security audit
        run: pip-audit || echo "pip-audit not installed, skipping"
        continue-on-error: true

      - name: Compliance check (enforce_check.py)
        run: python scripts/enforce_check.py --project-root .

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: report.xml

  # ======================
  # CD: 持续部署
  # ======================
  cd:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Semantic versioning
        id: semver
        run: |
          # 基于 commit 日志自动生成版本号
          COMMITS=$(git log --oneline --abbrev=12 -1)
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "version=${TAG}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          echo "Building Docker image: ${{ steps.semver.outputs.version }}"
          # docker build -t myapp:${{ steps.semver.outputs.version }} .

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          # kubectl set image deployment/myapp myapp=myapp:${{ steps.semver.outputs.version }}

      - name: Integration tests
        run: |
          echo "Running integration tests on staging..."

      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          # kubectl set image deployment/myapp-prod myapp=myapp:${{ steps.semver.outputs.version }}
